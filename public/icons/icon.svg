<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Bandhan AI Icon — Monochromatic Comic Book Style -->
  <!-- Background: White circle with thick black border -->
  <circle cx="256" cy="256" r="248" fill="#FFFFFF" stroke="#000000" stroke-width="16"/>
  <!-- Inner heart shape (simplified, bold strokes) -->
  <path d="M256 420
    C 180 350, 90 280, 90 200
    C 90 150, 130 110, 175 110
    C 210 110, 240 135, 256 160
    C 272 135, 302 110, 337 110
    C 382 110, 422 150, 422 200
    C 422 280, 332 350, 256 420Z"
    fill="#000000" stroke="#000000" stroke-width="4" stroke-linejoin="round"/>
  <!-- Two interlinked circles (bandhan = bond) inside the heart -->
  <circle cx="218" cy="230" r="32" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <circle cx="294" cy="230" r="32" fill="none" stroke="#FFFFFF" stroke-width="6"/>
  <!-- Small AI dot -->
  <circle cx="256" cy="290" r="8" fill="#FFFFFF"/>
</svg>
